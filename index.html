<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Погода - Точний прогноз</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/modern-normalize@2.0.0/modern-normalize.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    
    <script type="module" src="/main.js"></script>
</head>

<body>
    <header class="app-header">
        <div class="header-content container">
            <a href="index.html" class="logo">
                <h1>
                    <span class="logo-pro">PR
                        <svg class="rotating-gear" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 48 48">
                            <polygon fill="#ff9800" points="37,29 42,24 37,19 37,11 29,11 24,6 19,11 11,11 11,19 6,24 11,29 11,37 19,37 24,42 29,37 37,37"></polygon>
                            <path fill="#ffeb3b" d="M13,24c0,6.1,4.9,11,11,11c6.1,0,11-4.9,11-11s-4.9-11-11-11C17.9,13,13,17.9,13,24"></path>
                        </svg>
                    </span> Погода
                </h1>
            </a>
            <form id="city-search-form" class="search-form">
                <input type="text" name="city" id="city-input" placeholder="Введіть місто..." aria-label="Пошук міста" required>
                <button type="submit" class="search-button">Пошук</button>
            </form>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="loader is-hidden"></div>

            <div class="weather-layout">
                
                <section id="current-weather" class="weather-card current-weather-card is-hidden">
                    <h2 class="city-name" id="display-city-name">Назва міста</h2>
                    
                    <div class="main-content-wrapper">
                        <div class="main-display">
                            <div class="temperature-box">
                                <span class="temperature-value" id="current-temp">--</span>
                                <span class="unit-degree">&deg;C</span>
                            </div>
                            <div class="main-icon-container" id="current-icon"></div>
                        </div>

                        <div id="current-day-details" class="current-details-table">
                            <table class="weather-table main-page-table">
                                <thead>
                                    <tr>
                                        <th></th>
                                        <th>Ранок</th>
                                        <th>День</th>
                                        <th>Вечір</th>
                                    </tr>
                                </thead>
                                <tbody id="main-table-body"></tbody>
                            </table>
                        </div>
                    </div>

                    <ul class="details-list">
                        <li>Відчувається як: <span id="feels-like">--°C</span></li>
                        <li>Вологість: <span id="humidity">--%</span></li>
                        <li>Вітер: <span id="wind">-- km/h</span></li>
                    </ul>
                    <div class="main-chart-wrapper">
    <canvas id="mainTempChart"></canvas>
</div>
                </section>

                <section id="forecast" class="forecast-section is-hidden">
                    <h3 class="forecast-title">Прогноз</h3>
                    <ul class="forecast-grid" id="forecast-list"></ul>
                </section>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content container">
            <p class="copyright">&copy; 2026 PRO Погода.</p>
            <p class="api-credits">
                Дані надані <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo API</a>.
            </p>
        </div>
    </footer>
</body>
</html>
